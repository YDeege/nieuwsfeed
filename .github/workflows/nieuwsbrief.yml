name: Wekelijkse nieuwsbrief

# Draait elke maandag om 07:00 UTC (09:00 NL zomertijd / 08:00 wintertijd)
# en is ook handmatig te starten via de knop "Run workflow".
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

# Test: om de 5 minuten draaien
#on:
  #schedule:
    #- cron: "*/5 * * * *"
  #workflow_dispatch:


# Rechten die GitHub Pages nodig heeft.
permissions:
  contents: read
  pages: write
  id-token: write

# Zorgt dat er niet twee runs tegelijk publiceren.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  bouwen-en-publiceren:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Nieuwsbrief samenstellen
        run: python src/main.py

      - name: Pages configureren
        uses: actions/configure-pages@v5

      - name: Build-map uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Publiceren naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
